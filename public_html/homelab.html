<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Lab — lasso.cat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --text:    #c9d1d9;
  --muted:   #6e7681;
  --accent:  #7500ff;
  --blue:    #388bfd;
  --green:   #3fb950;
  --amber:   #d29922;
  --grid:    #1d2433;
  --node:    #1c2128;
  --nodeh:   #252c36;
  --nt:      #e6edf3;
  --ns:      #505968;
  --zl:      #2d333b;
}
html.light {
  --bg:      #f6f8fa;
  --surface: #ffffff;
  --border:  #d0d7de;
  --text:    #24292f;
  --muted:   #57606a;
  --accent:  #7500ff;
  --blue:    #0969da;
  --green:   #1a7f37;
  --amber:   #9a6700;
  --grid:    #e8ecf2;
  --node:    #ffffff;
  --nodeh:   #f3f5f8;
  --nt:      #24292f;
  --ns:      #8c959f;
  --zl:      #cdd0d4;
}

/* ── Layout ─────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}
body {
  display: flex;
  flex-direction: column;
  padding: 12px 16px 10px;
  gap: 9px;
}

/* ── Header ─────────────────────────── */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  padding-bottom: 9px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.hdr-title { font-size: .88rem; font-weight: 600; letter-spacing: -.02em; }
.hdr-title em { color: var(--accent); font-style: normal; }
.hdr-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.spec { font-family: 'JetBrains Mono', monospace; font-size: .58rem; color: var(--muted); }
.online { display: flex; align-items: center; gap: 5px; font-family: 'JetBrains Mono', monospace; font-size: .58rem; color: var(--green); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Diagram wrap ───────────────────── */
.diagram-wrap {
  flex: 1;
  min-height: 0;         /* critical: lets flex child shrink below content size */
  overflow: auto;
  display: flex;         /* so SVG height:100% works */
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}

/* SVG scales by height so it always fits the viewport */
#lab-svg {
  flex-shrink: 0;
  height: 100%;          /* fill available height */
  width: auto;           /* width adjusts proportionally */
  min-width: 700px;      /* prevent squishing on narrow screens */
  display: block;
}

/* ── Legend ─────────────────────────── */
.legend {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 5px 14px; padding: 6px 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: .57rem; color: var(--muted);
  flex-shrink: 0;
}
.li { display: flex; align-items: center; gap: 5px; }
.legend-hint { margin-left: auto; opacity: .4; }

/* ── Tooltip ────────────────────────── */
.tt {
  position: fixed; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: .67rem; line-height: 1.65;
  color: var(--text); pointer-events: none; z-index: 9999; max-width: 248px;
  box-shadow: 0 8px 28px rgba(0,0,0,.22); opacity: 0; transition: opacity .1s;
  font-family: 'Inter', sans-serif;
}
.tt.show { opacity: 1; }
.tt-title { font-size: .78rem; font-weight: 600; margin-bottom: 2px; }
.tt-type  { font-family: 'JetBrains Mono', monospace; font-size: .55rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em; padding-bottom: 6px;
  border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.tt-desc  { white-space: pre-line; font-size: .65rem; color: var(--muted); }

.node-g { cursor: default; }
</style>
</head>
<body>

<header class="hdr">
  <h2 class="hdr-title">Home<em>Lab</em></h2>
  <div class="hdr-right">
    <span class="spec">i7-6700 · GTX 1050Ti · 16 GB DDR4</span>
    <span class="spec">Proxmox · OPNsense · Tailscale · Cloudflare</span>
    <div class="online"><span class="dot"></span>online</div>
  </div>
</header>

<div class="diagram-wrap">
  <!-- viewBox height reduced to 515 — tighter vertical spacing -->
  <svg id="lab-svg" viewBox="0 0 920 515" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
        <path d="M28 0L0 0 0 28" fill="none" stroke="var(--grid)" stroke-width=".5"/>
      </pattern>
    </defs>

    <rect width="920" height="515" fill="var(--surface)"/>
    <rect width="920" height="515" fill="url(#grid)" opacity=".7"/>

    <!-- Zone: Tailscale Mesh -->
    <rect x="20" y="414" width="880" height="90" rx="10"
          fill="rgba(63,185,80,.03)" stroke="var(--green)" stroke-width=".9"
          stroke-dasharray="7 5" opacity=".5"/>

    <!-- Zone: Isolated VLAN (around TOR) -->
    <rect x="374" y="334" width="172" height="76" rx="8"
          fill="rgba(117,0,255,.04)" stroke="var(--accent)" stroke-width=".8"
          stroke-dasharray="4 3" opacity=".7"/>

    <!-- Layer labels -->
    <g font-family="JetBrains Mono,monospace" font-size="7.5" font-weight="600"
       letter-spacing=".1em" fill="var(--zl)" text-rendering="geometricPrecision">
      <text x="42" y="30">INTERNET EDGE</text>
      <text x="42" y="132">FIREWALL / ROUTER</text>
      <text x="42" y="234">HYPERVISOR</text>
      <text x="42" y="335">LXC / VMs</text>
      <text x="36" y="425">TAILSCALE MESH</text>
    </g>
    <text x="383" y="349" font-family="JetBrains Mono,monospace" font-size="6.5"
          fill="var(--accent)" opacity=".65" letter-spacing=".08em">ISOLATED VLAN</text>

    <g id="g-conns"></g>
    <g id="g-nodes"></g>
  </svg>
</div>

<footer class="legend">
  <div class="li">
    <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#7500ff" stroke-width="1.8" stroke-dasharray="5 7"/></svg>Core
  </div>
  <div class="li">
    <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#388bfd" stroke-width="1.4" stroke-dasharray="4 6"/></svg>LXC
  </div>
  <div class="li">
    <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#3fb950" stroke-width="1.8" stroke-dasharray="8 6"/></svg>Tailscale hub
  </div>
  <div class="li">
    <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#3fb950" stroke-width="1" stroke-dasharray="3 4"/></svg>Mesh node
  </div>
  <div class="li">
    <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#d29922" stroke-width="1" stroke-dasharray="2 4"/></svg>Notification
  </div>
  <span class="legend-hint">hover a node for details</span>
</footer>

<div id="tt" class="tt">
  <div id="tt-title" class="tt-title"></div>
  <div id="tt-type"  class="tt-type"></div>
  <div id="tt-desc"  class="tt-desc"></div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────
const p = new URLSearchParams(window.location.search);
const isDark = (p.get('theme') || 'dark') !== 'light';
if (!isDark) document.documentElement.classList.add('light');

const C = isDark ? {
  accent:'#7500ff', blue:'#388bfd', green:'#3fb950', amber:'#d29922',
  muted:'#484f58', node:'#1c2128', nodeh:'#252c36', nt:'#e6edf3', ns:'#505968', border:'#30363d',
} : {
  accent:'#7500ff', blue:'#0969da', green:'#1a7f37', amber:'#9a6700',
  muted:'#8c959f', node:'#ffffff', nodeh:'#f3f5f8', nt:'#24292f', ns:'#8c959f', border:'#d0d7de',
};

// ── Nodes (x,y = center) ──────────────────────────────────────
// Row y positions: Internet=70, Firewall=168, Proxmox=272, LXC=372, Mesh=456
// CF/OPS centered at x=390; LXC spread: 110,282,460,638,816
const NODES = [
  // Internet
  { id:'cf',  label:'Cloudflare',    sub:'DNS · DDNS · DDoS protection',
    x:390, y:70, w:178, h:56, col:C.blue,
    typeLabel:'Cloud / CDN',
    desc:'Proxy DNS + DDoS protection\nDynamic DNS: a script watches for\npublic IP changes and updates Cloudflare\nCloudflare → notifies via Telegram' },
  { id:'tg',  label:'Telegram Bot',  sub:'DDNS · Wazuh · Honeypot alerts',
    x:730, y:70, w:168, h:56, col:C.amber,
    typeLabel:'Notification Hub',
    desc:'Centralised real-time alerts:\n· Public IP change (DDNS)\n· Wazuh SIEM events\n· SSH Honeypot sessions captured' },

  // Firewall
  { id:'ops', label:'OPNsense',      sub:'Firewall · NAT · WireGuard VPN',
    x:390, y:168, w:188, h:56, col:C.accent,
    typeLabel:'Firewall / Router — VM on Proxmox',
    desc:'Main router running as a Proxmox VM\nStateful firewall + port-forwarding NAT\nWireGuard VPN for remote access\nDDNS script → calls Cloudflare API' },

  // Hypervisor
  { id:'pmx', label:'Proxmox VE',    sub:'i7-6700  ·  16 GB DDR4  ·  GTX 1050Ti',
    x:460, y:272, w:256, h:66, col:C.accent, main:true,
    typeLabel:'Hypervisor — Physical Tower',
    desc:'The foundation of the homelab\nIntel i7-6700 · 16 GB DDR4\nNVIDIA GTX 1050Ti for GPU passthrough\nManages all VMs and LXC containers' },

  // LXC / VMs — centers at x: 110, 282, 460, 638, 816
  { id:'vw',  label:'Vaultwarden',   sub:'passwords · 2FA TOTP',
    x:110, y:372, w:152, h:54, col:C.blue,
    typeLabel:'LXC Container',
    desc:'Self-hosted Bitwarden-compatible\npassword manager\n2FA with TOTP authenticator app\nUsed for all lab credentials + 2FA' },
  { id:'prx', label:'Caddy / Nginx', sub:'reverse proxy · TLS',
    x:282, y:372, w:152, h:54, col:C.blue,
    typeLabel:'LXC Container',
    desc:"Reverse proxy rotating between:\nCaddy · Nginx · Traefik\nAutomatic Let's Encrypt TLS\nTerminates HTTPS for all local services" },
  { id:'tor', label:'TOR Mirror',    sub:'isolated VLAN · 🧅',
    x:460, y:372, w:152, h:54, col:C.accent, dash:'4 2',
    typeLabel:'VM — Isolated VLAN',
    desc:'Personal site mirrored over TOR\nRuns as a VM in a VLAN fully\nisolated from the rest of the infra\nSpun up when I feel like it 🧅' },
  { id:'ola', label:'Ollama',        sub:'local LLMs · GPU passthrough',
    x:638, y:372, w:152, h:54, col:C.blue,
    typeLabel:'LXC Container',
    desc:'Local LLM inference on GTX 1050Ti\nvia GPU passthrough to the LXC\nSmall models — limited VRAM\nbut enough to tinker and experiment' },
  { id:'dev', label:'Dev Lab',       sub:'Terraform · Ansible',
    x:816, y:372, w:152, h:54, col:C.blue,
    typeLabel:'LXC / Dev Templates',
    desc:'Reusable LXC dev environment templates\nTerraform for infra provisioning\nAnsible for automated configuration\nBase for projects like the SSH Honeypot' },

  // Tailscale mesh — aligned with LXC above: 110, 282, 460, 638, 816
  { id:'ts',   label:'Tailscale',       sub:'Mesh VPN · WireGuard',
    x:110, y:456, w:152, h:52, col:C.green,
    typeLabel:'VPN Mesh Hub',
    desc:'WireGuard-based mesh VPN\nInterconnects all devices:\nTower · VPS · Mobile · CETI · Luckfox\nWorks without static IP via DERP relays' },
  { id:'vps',  label:'VPS',             sub:'SSH Honeypot · testing',
    x:282, y:456, w:135, h:48, col:C.muted,
    typeLabel:'Remote VPS',
    desc:'Remote machine for testing\nSSH Honeypot running here:\ncaptures sessions, enriches with GeoIP,\nAI analysis → alert via Telegram' },
  { id:'mob',  label:'Mobile',          sub:'Tailscale · Vaultwarden',
    x:460, y:456, w:130, h:48, col:C.muted,
    typeLabel:'Mobile Device',
    desc:'Secure access from any network\nTailscale creates a WireGuard tunnel\nVaultwarden for passwords and 2FA' },
  { id:'ceti', label:'CETI Institute',  sub:'Zabbix · Wazuh SIEM',
    x:638, y:456, w:152, h:48, col:C.muted,
    typeLabel:'Remote Node — CETI',
    desc:'Machine at the CETI institute\nZabbix: infra metrics & uptime\nWazuh: SIEM + threat detection\nAlerts → Telegram · Access → Tailscale' },
  { id:'lf',   label:'Luckfox Pico+',  sub:'entropy source · WIP 🧪',
    x:816, y:456, w:152, h:48, col:C.amber, dash:'5 2',
    typeLabel:'Experimental — WIP',
    desc:"Luckfox Pico Plus + camera module\nGoal: replicate Cloudflare's lava lamp\nas a physical entropy source\nCurrently parked — still on the list" },
];

// ── Connection styles ─────────────────────────────────────────
const S = {
  core: { c:C.accent, w:1.8, da:'5 9',  anim:true,  dur:2.0, op:.7  },
  lxc:  { c:C.blue,   w:1.4, da:'4 8',  anim:true,  dur:2.8, op:.6  },
  iso:  { c:C.accent, w:1.2, da:'4 3',  anim:false, dur:0,   op:.5  },
  ntf:  { c:C.amber,  w:1.0, da:'2 5',  anim:false, dur:0,   op:.6  },
  ts:   { c:C.green,  w:2.0, da:'9 8',  anim:true,  dur:1.6, op:.75 },
  mesh: { c:C.green,  w:1.0, da:'3 5',  anim:false, dur:0,   op:.4  },
};

// Connections — coordinates derived from node centers above
// CF x=390,w=178 → right=479, bottom=98 | TG x=730,w=168 → left=646, bottom=98
// OPS x=390,w=188 → right=484, bottom=196 | PMX x=460,w=256 → top=239, bottom=305
// LXC/Mesh x: 110,282,460,638,816 | TS right=186
const CONNS = [
  { t:'core', d:'M 390,98  L 390,140' },                                    // CF → OPS
  { t:'ntf',  d:'M 479,70  L 646,70'  },                                    // CF → TG (horizontal)
  { t:'ntf',  d:'M 484,168 C 590,138 610,112 646,98' },                     // OPS → TG (curve)
  { t:'core', d:'M 390,196 C 390,220 460,220 460,239' },                    // OPS → PMX (S-curve)
  { t:'lxc',  d:'M 460,305 C 460,332 110,332 110,345' },                    // PMX → Vaultwarden
  { t:'lxc',  d:'M 460,305 C 460,332 282,332 282,345' },                    // PMX → Caddy
  { t:'iso',  d:'M 460,305 L 460,345' },                                    // PMX → TOR (straight)
  { t:'lxc',  d:'M 460,305 C 460,332 638,332 638,345' },                    // PMX → Ollama
  { t:'lxc',  d:'M 460,305 C 460,332 816,332 816,345' },                    // PMX → Dev Lab
  { t:'ts',   d:'M 460,305 C 460,378 110,378 110,430' },                    // PMX → Tailscale
  { t:'mesh', d:'M 186,456 L 214,456' },                                    // TS → VPS
  { t:'mesh', d:'M 186,456 L 395,456' },                                    // TS → Mobile
  { t:'mesh', d:'M 186,456 L 562,456' },                                    // TS → CETI
  { t:'mesh', d:'M 186,456 L 740,456' },                                    // TS → Luckfox
];

// ── Render ────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
const gC = document.getElementById('g-conns');
const gN = document.getElementById('g-nodes');

CONNS.forEach((conn, i) => {
  const s = S[conn.t];
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', conn.d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', s.c);
  path.setAttribute('stroke-width', s.w);
  path.setAttribute('opacity', s.op);
  path.setAttribute('stroke-dasharray', s.da);
  path.setAttribute('stroke-linecap', 'round');
  if (s.anim) {
    const total = s.da.split(' ').map(Number).reduce((a, b) => a + b, 0);
    const anim = document.createElementNS(NS, 'animate');
    anim.setAttribute('attributeName', 'stroke-dashoffset');
    anim.setAttribute('from', '0');
    anim.setAttribute('to', String(-total));
    anim.setAttribute('dur', `${(s.dur + (i % 5) * 0.15).toFixed(2)}s`);
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('calcMode', 'linear');
    path.appendChild(anim);
  }
  gC.appendChild(path);
});

const ttEl    = document.getElementById('tt');
const ttTitle = document.getElementById('tt-title');
const ttType  = document.getElementById('tt-type');
const ttDesc  = document.getElementById('tt-desc');

NODES.forEach(n => {
  const g  = document.createElementNS(NS, 'g');
  g.setAttribute('class', 'node-g');
  const lx = n.x - n.w / 2;
  const ly = n.y - n.h / 2;
  const rx = 7;

  if (n.main) {
    const glow = document.createElementNS(NS, 'rect');
    glow.setAttribute('x', lx - 4); glow.setAttribute('y', ly - 4);
    glow.setAttribute('width', n.w + 8); glow.setAttribute('height', n.h + 8);
    glow.setAttribute('rx', rx + 3); glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', n.col); glow.setAttribute('stroke-width', '1');
    glow.setAttribute('opacity', '.15');
    g.appendChild(glow);
  }

  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('x', lx); rect.setAttribute('y', ly);
  rect.setAttribute('width', n.w); rect.setAttribute('height', n.h);
  rect.setAttribute('rx', rx);
  rect.setAttribute('fill', C.node);
  rect.setAttribute('stroke', n.col);
  rect.setAttribute('stroke-width', n.main ? '1.8' : '1.2');
  rect.setAttribute('stroke-opacity', n.main ? '1' : '0.6');
  if (n.dash) rect.setAttribute('stroke-dasharray', n.dash);
  g.appendChild(rect);

  const label = document.createElementNS(NS, 'text');
  label.setAttribute('x', n.x);
  label.setAttribute('y', n.sub ? n.y - 8 : n.y);
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('dominant-baseline', 'middle');
  label.setAttribute('fill', n.main ? n.col : C.nt);
  label.setAttribute('font-family', 'Inter, sans-serif');
  label.setAttribute('font-size', n.main ? '13' : '11.5');
  label.setAttribute('font-weight', n.main ? '600' : '500');
  label.textContent = n.label;
  g.appendChild(label);

  if (n.sub) {
    const sub = document.createElementNS(NS, 'text');
    sub.setAttribute('x', n.x);
    sub.setAttribute('y', n.y + 9);
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('dominant-baseline', 'middle');
    sub.setAttribute('fill', C.ns);
    sub.setAttribute('font-family', 'JetBrains Mono, monospace');
    sub.setAttribute('font-size', n.main ? '8.5' : '7.5');
    sub.textContent = n.sub;
    g.appendChild(sub);
  }

  // Transparent hit area for better hover
  const hit = document.createElementNS(NS, 'rect');
  hit.setAttribute('x', lx); hit.setAttribute('y', ly);
  hit.setAttribute('width', n.w); hit.setAttribute('height', n.h);
  hit.setAttribute('rx', rx); hit.setAttribute('fill', 'transparent');
  g.appendChild(hit);

  g.addEventListener('mouseenter', () => {
    rect.setAttribute('fill', C.nodeh);
    ttTitle.textContent = n.label;
    ttType.textContent  = n.typeLabel;
    ttDesc.textContent  = n.desc;
    ttEl.classList.add('show');
  });
  g.addEventListener('mousemove', e => {
    ttEl.style.left = Math.min(e.clientX + 16, window.innerWidth  - 265) + 'px';
    ttEl.style.top  = Math.min(e.clientY -  8, window.innerHeight - 175) + 'px';
  });
  g.addEventListener('mouseleave', () => {
    rect.setAttribute('fill', C.node);
    ttEl.classList.remove('show');
  });

  gN.appendChild(g);
});
</script>
</body>
</html>
